name: Deploy Production Worker

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PROD_DB_NAME: freight-bills-db
      PROD_DB_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID_PROD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shared setup
        uses: ./.github/actions/setup-cloudflare-node
        with:
          node-version: '22'
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Validate production database secret
        env:
          PROD_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID_PROD }}
        run: |
          set -euo pipefail
          if [ -z "${PROD_DATABASE_ID}" ]; then
            echo "Missing required secret: CLOUDFLARE_D1_DATABASE_ID_PROD" >&2
            exit 1
          fi

      - name: Validate production Access secrets
        env:
          PROD_TEAM_DOMAIN: ${{ secrets.CF_ACCESS_TEAM_DOMAIN_PROD }}
          PROD_POLICY_AUD: ${{ secrets.CF_ACCESS_POLICY_AUD_PROD }}
        run: |
          set -euo pipefail
          if [ -z "${PROD_TEAM_DOMAIN}" ]; then
            echo "Missing required secret: CF_ACCESS_TEAM_DOMAIN_PROD" >&2
            exit 1
          fi
          if [ -z "${PROD_POLICY_AUD}" ]; then
            echo "Missing required secret: CF_ACCESS_POLICY_AUD_PROD" >&2
            exit 1
          fi
          if [[ "${PROD_TEAM_DOMAIN}" != https://* ]]; then
            echo "CF_ACCESS_TEAM_DOMAIN_PROD must start with https://" >&2
            exit 1
          fi
          if [[ "${PROD_TEAM_DOMAIN}" == */ ]]; then
            echo "CF_ACCESS_TEAM_DOMAIN_PROD must not have a trailing slash" >&2
            exit 1
          fi
          if [[ "${PROD_POLICY_AUD}" == "replace-with-access-app-aud" ]]; then
            echo "CF_ACCESS_POLICY_AUD_PROD is still set to a placeholder value" >&2
            exit 1
          fi

      - name: Build frontend and backend bundle
        run: npm run build

      - name: Generate production Wrangler config for CI
        env:
          PROD_TEAM_DOMAIN: ${{ secrets.CF_ACCESS_TEAM_DOMAIN_PROD }}
          PROD_POLICY_AUD: ${{ secrets.CF_ACCESS_POLICY_AUD_PROD }}
        run: |
          cat > backend/wrangler.production.ci.toml <<EOF
          name = "freight-bill-tracker"
          main = "src/index.ts"
          compatibility_date = "2025-03-31"
          compatibility_flags = ["nodejs_compat"]

          [vars]
          TEAM_DOMAIN = "${PROD_TEAM_DOMAIN}"
          POLICY_AUD = "${PROD_POLICY_AUD}"
          JWT_VALIDATION_DISABLED = "false"

          [[d1_databases]]
          binding = "DB"
          database_name = "${PROD_DB_NAME}"
          database_id = "${PROD_DB_ID}"

          [assets]
          directory = "../frontend/dist"
          EOF

      - name: Apply D1 migrations (production)
        run: npm exec --workspace=backend -- wrangler d1 migrations apply "${PROD_DB_NAME}" --remote --config wrangler.production.ci.toml

      - name: Deploy production Worker
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          command: deploy --config wrangler.production.ci.toml

      - name: Summary
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          {
            echo "### Production deploy"
            echo "- Worker: freight-bill-tracker"
            echo "- Database: ${PROD_DB_NAME}"
            echo "- Deployment URL: ${DEPLOYMENT_URL:-n/a}"
            echo "- Migrations: applied before deploy"
          } >> "$GITHUB_STEP_SUMMARY"
