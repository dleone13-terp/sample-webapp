name: Deploy Preview Worker

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      STAGING_DB_NAME: freight-bills-staging
      STAGING_WORKER_NAME: freight-bill-tracker-staging
    outputs:
      db_name: ${{ steps.db.outputs.db_name }}
      worker_name: ${{ steps.db.outputs.worker_name }}
      deployment_url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shared setup
        uses: ./.github/actions/setup-cloudflare-node
        with:
          node-version: '22'
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Validate preview Access secrets
        env:
          PREVIEW_TEAM_DOMAIN: ${{ secrets.CF_ACCESS_TEAM_DOMAIN_PREVIEW }}
          PREVIEW_POLICY_AUD: ${{ secrets.CF_ACCESS_POLICY_AUD_PREVIEW }}
        run: |
          set -euo pipefail
          if [ -z "${PREVIEW_TEAM_DOMAIN}" ]; then
            echo "Missing required secret: CF_ACCESS_TEAM_DOMAIN_PREVIEW" >&2
            exit 1
          fi
          if [ -z "${PREVIEW_POLICY_AUD}" ]; then
            echo "Missing required secret: CF_ACCESS_POLICY_AUD_PREVIEW" >&2
            exit 1
          fi
          if [[ "${PREVIEW_TEAM_DOMAIN}" != https://* ]]; then
            echo "CF_ACCESS_TEAM_DOMAIN_PREVIEW must start with https://" >&2
            exit 1
          fi
          if [[ "${PREVIEW_TEAM_DOMAIN}" == */ ]]; then
            echo "CF_ACCESS_TEAM_DOMAIN_PREVIEW must not have a trailing slash" >&2
            exit 1
          fi
          if [[ "${PREVIEW_POLICY_AUD}" == "replace-with-access-app-aud" ]]; then
            echo "CF_ACCESS_POLICY_AUD_PREVIEW is still set to a placeholder value" >&2
            exit 1
          fi

      - name: Build frontend and backend bundle
        run: npm run build

      - name: Create or resolve staging D1 database
        id: db
        run: |
          set -euo pipefail
          DB_NAME="${STAGING_DB_NAME}"
          WORKER_NAME="${STAGING_WORKER_NAME}"

          DB_ID=$(node .github/scripts/resolve-d1-database.js "$DB_NAME" --create)

          if [ -z "$DB_ID" ]; then
            echo "Could not resolve D1 database ID for ${DB_NAME}" >&2
            exit 1
          fi

          echo "db_name=${DB_NAME}" >> "$GITHUB_OUTPUT"
          echo "db_id=${DB_ID}" >> "$GITHUB_OUTPUT"
          echo "worker_name=${WORKER_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate staging Wrangler config for CI
        env:
          DB_NAME: ${{ steps.db.outputs.db_name }}
          DB_ID: ${{ steps.db.outputs.db_id }}
          WORKER_NAME: ${{ steps.db.outputs.worker_name }}
          PREVIEW_TEAM_DOMAIN: ${{ secrets.CF_ACCESS_TEAM_DOMAIN_PREVIEW }}
          PREVIEW_POLICY_AUD: ${{ secrets.CF_ACCESS_POLICY_AUD_PREVIEW }}
        run: |
          cat > backend/wrangler.staging.ci.toml <<EOF
          name = "${WORKER_NAME}"
          main = "src/index.ts"
          compatibility_date = "2025-03-31"
          compatibility_flags = ["nodejs_compat"]
          workers_dev = true
          preview_urls = true

          [vars]
          TEAM_DOMAIN = "${PREVIEW_TEAM_DOMAIN}"
          POLICY_AUD = "${PREVIEW_POLICY_AUD}"
          JWT_VALIDATION_DISABLED = "false"

          [[d1_databases]]
          binding = "DB"
          database_name = "${DB_NAME}"
          database_id = "${DB_ID}"

          [assets]
          directory = "../frontend/dist"
          EOF

      - name: Apply D1 migrations (preview)
        env:
          DB_NAME: ${{ steps.db.outputs.db_name }}
        run: |
          set -euo pipefail
          if ! npm exec --workspace=backend -- wrangler d1 migrations apply "${DB_NAME}" --remote --config wrangler.staging.ci.toml; then
            echo "Preview migrations failed for ${DB_NAME}. Listing visible D1 databases for diagnostics." >&2
            npm exec --workspace=backend -- wrangler d1 list || true
            exit 1
          fi

      - name: Deploy preview Worker
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          command: deploy --config wrangler.staging.ci.toml

      - name: Comment PR with preview URL
        uses: actions/github-script@v8
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const body = [
              'Preview is ready.',
              `- URL: ${process.env.DEPLOYMENT_URL || 'n/a'}`,
              '- Environment: staging',
              '- Flow: same as production (migrate then deploy)',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

      - name: Summary
        env:
          DB_NAME: ${{ steps.db.outputs.db_name }}
          WORKER_NAME: ${{ steps.db.outputs.worker_name }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          {
            echo "### Preview deploy"
            echo "- PR: #${PR_NUMBER}"
            echo "- Environment: staging"
            echo "- Worker: ${WORKER_NAME}"
            echo "- Database: ${DB_NAME}"
            echo "- Deployment URL: ${DEPLOYMENT_URL:-n/a}"
            echo "- Migrations: applied before deploy"
          } >> "$GITHUB_STEP_SUMMARY"
