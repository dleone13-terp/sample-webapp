name: Setup Node and validate Cloudflare credentials
description: Checks out code, configures Node, installs dependencies, and validates required Cloudflare env vars.

inputs:
  node-version:
    description: Node.js version to use
    required: false
    default: "22"
  api-token:
    description: Cloudflare API token value
    required: true
  account-id:
    description: Cloudflare account ID value
    required: true
  require-pr-number:
    description: Whether PR number validation is required
    required: false
    default: "false"
  pr-number:
    description: PR number value when required
    required: false

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Validate Cloudflare credentials
      shell: bash
      env:
        API_TOKEN: ${{ inputs.api-token }}
        ACCOUNT_ID: ${{ inputs.account-id }}
        REQUIRE_PR_NUMBER: ${{ inputs.require-pr-number }}
        PR_NUMBER: ${{ inputs.pr-number }}
      run: |
        set -euo pipefail
        if [ -z "${API_TOKEN}" ]; then
          echo "Missing required secret: CLOUDFLARE_API_TOKEN" >&2
          exit 1
        fi
        if [ -z "${ACCOUNT_ID}" ]; then
          echo "Missing required secret: CLOUDFLARE_ACCOUNT_ID" >&2
          exit 1
        fi
        if [ "${REQUIRE_PR_NUMBER}" = "true" ] && [ -z "${PR_NUMBER}" ]; then
          echo "Unable to resolve PR number for preview deployment" >&2
          exit 1
        fi
